    <script>
        // ==========================================
        // 字典与翻译辅助引擎
        // ==========================================
        const dict = {
            zh: {
                'nav-logout': '退出登录', 'nav-delete': '注销账号', 'nav-history': '历史',
                'theme-title': '主题模式', 'theme-light': '浅色模式', 'theme-dark': '深色模式', 'theme-sys': '跟随系统',
                'lang-toggle': '切换语言 / EN',
                'nav-sidebar': '侧栏', 'app-title': '云笔记',
                'btn-new-note': '新笔记', 'btn-new-folder': '新分类',
                'btn-import-export': '导入与导出', 'label-folder': '文件夹',
                'label-content': '笔记集', 'label-editor': '编辑栏',
                'label-category': '归属地:', 'trash-title': '回收站',
                'btn-list': '列表', 'btn-grid': '图表',
                'all-docs': '全笔记展示', 'no-data': '无数据', 'trash-empty': '回收站空空如也',
                'untitled': '无标题', 'original-folder': '原位置:',
                'fmt-size': '字号', 'sz-1': '1号 (10px)', 'sz-2': '2号 (13px)', 'sz-3': '3号 (16px 正常)', 'sz-4': '4号 (18px)', 'sz-5': '5号 (24px)', 'sz-6': '6号 (32px)', 'sz-7': '7号 (48px)',
                'fmt-heading': '标题', 'h1': '一级标题', 'h2': '二级标题', 'h3': '三级标题', 'p': '正文',
                'color-white': '白', 'color-red': '红', 'color-yellow': '黄', 'color-blue': '蓝', 'color-green': '绿', 'color-black': '黑',
                'fmt-img': '图', 'btn-recover': '恢复', 'btn-empty': '清空', 'ctx-rename': '重命名分类', 'ctx-delete': '安全删除分类',
                '未分类': '未分类', '工作': '工作', '生活': '生活',
                'btn-import-folder': '导入文件夹', 'btn-export-folder': '导出文件夹'
            },
            en: {
                'nav-logout': 'Logout', 'nav-delete': 'Delete Account', 'nav-history': 'History',
                'theme-title': 'Theme Mode', 'theme-light': 'Light Mode', 'theme-dark': 'Dark Mode', 'theme-sys': 'System Default',
                'lang-toggle': 'Switch Lang / 中文',
                'nav-sidebar': 'Sidebar', 'app-title': 'Cloud Note',
                'btn-new-note': 'New Note', 'btn-new-folder': 'New Folder',
                'btn-import-export': 'Import/Export', 'label-folder': 'Folders',
                'label-content': 'Content', 'label-editor': 'Editor',
                'label-category': 'Category:', 'trash-title': 'Trash',
                'btn-list': 'List', 'btn-grid': 'Grid',
                'all-docs': 'All Documents', 'no-data': 'No Data', 'trash-empty': 'Trash is empty',
                'untitled': 'Untitled', 'original-folder': 'From:',
                'fmt-size': 'Size', 'sz-1': 'Sz 1 (10px)', 'sz-2': 'Sz 2 (13px)', 'sz-3': 'Sz 3 (16px Normal)', 'sz-4': 'Sz 4 (18px)', 'sz-5': 'Sz 5 (24px)', 'sz-6': 'Sz 6 (32px)', 'sz-7': 'Sz 7 (48px)',
                'fmt-heading': 'Heading', 'h1': 'Heading 1', 'h2': 'Heading 2', 'h3': 'Heading 3', 'p': 'Normal Text',
                'color-white': 'W', 'color-red': 'R', 'color-yellow': 'Y', 'color-blue': 'B', 'color-green': 'G', 'color-black': 'Bk',
                'fmt-img': 'Img', 'btn-recover': 'Restore', 'btn-empty': 'Empty', 'ctx-rename': 'Rename', 'ctx-delete': 'Delete safely',
                '未分类': 'Uncategorized', '工作': 'Work', '生活': 'Life',
                'btn-import-folder': 'Import Folder', 'btn-export-folder': 'Export Folder'
            }
        };

        let currentLang = localStorage.getItem('app-lang') || 'zh';

        function t(key) { return dict[currentLang][key] || key; }

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('app-lang', currentLang);
            updateLanguageUI();
            refreshAllViews(); 
        }

        function updateLanguageUI() {
            const currentDict = dict[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (currentDict[key]) el.innerText = currentDict[key];
            });
        }

        function toggleSettingsMenu(e) {
            e.stopPropagation(); 
            document.getElementById('settings-dropdown').classList.toggle('hidden');
        }

        function closeSettingsMenu() {
            document.getElementById('settings-dropdown').classList.add('hidden');
        }

        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('settings-dropdown');
            if (dropdown && !dropdown.classList.contains('hidden') && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
            
            // 💡 新增：点击其他地方时，自动关闭新的导入导出悬浮下拉菜单
            const ieDropdown = document.getElementById('import-export-content');
            const ieWrap = document.getElementById('btn-import-export-wrap');
            if (ieDropdown && !ieDropdown.classList.contains('hidden') && (!ieWrap || !ieWrap.contains(e.target))) {
                ieDropdown.classList.add('hidden');
                const arrow = document.getElementById('import-export-arrow');
                if(arrow) arrow.classList.remove('rotate-180');
            }
            
            document.getElementById('custom-context-menu').classList.add('hidden');
        });

        function setTheme(theme) {
            localStorage.setItem('app-theme', theme); 
            applyTheme(theme);
        }

        function applyTheme(theme) {
            const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) {
                document.documentElement.classList.add('dark'); 
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (localStorage.getItem('app-theme') === 'system' || !localStorage.getItem('app-theme')) {
                applyTheme('system');
            }
        });

        let notes = [];
        let trashBin = [];
        let isCloudDataLoaded = false; // 🔒 新增：云端防覆盖安全锁
        let categories = [
            { id: "未分类", name: "未分类", parentId: null },
            { id: "工作", name: "工作", parentId: null },
            { id: "生活", name: "生活", parentId: null }
        ];
        let categoryColors = { "未分类": "#64748b", "工作": "#3b82f6", "生活": "#10b981" };
        let folderTreeRelations = {}; 
        let leftExpandedFolders = {}; 
        let currentFilterCategory = "全部"; 
        let activeNoteId = null;
        let saveTimeout = null;
        let draggedNoteId = null; 
        let isFolderSectionExpanded = true; 
        let isContentSectionExpanded = true; 

        function toggleContentSection() {
            isContentSectionExpanded = !isContentSectionExpanded;
            const container = document.getElementById('content-section-container');
            const icon = document.getElementById('content-section-icon');
            
            if (isContentSectionExpanded) {
                container.classList.remove('hidden');
                icon.classList.remove('-rotate-90');
            } else {
                container.classList.add('hidden');
                icon.classList.add('-rotate-90');
            }
        }

        function toggleFolderSection() {
            isFolderSectionExpanded = !isFolderSectionExpanded;
            const container = document.getElementById('category-tree-container');
            const icon = document.getElementById('folder-section-icon');
            if (isFolderSectionExpanded) {
                container.classList.remove('hidden');
                icon.classList.remove('-rotate-90');
            } else {
                container.classList.add('hidden');
                icon.classList.add('-rotate-90');
            }
        }
        
        let leftPanelClosed = false;
        let rightPanelClosed = true;
        let treeLayoutView = "list"; 
        let leftLayoutView = "list";
        let rightClickedCategoryId = null; 
        
        let isLoginMode = true;
        let cfUser = localStorage.getItem('cfUser');
        let cfPass = localStorage.getItem('cfPass');
        
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? '登入云端工作台' : '注册新账号';
            document.getElementById('auth-btn').innerText = isLoginMode ? '登入' : '立即注册';
            document.getElementById('auth-toggle').innerText = isLoginMode ? '没有账号？点击注册新账号' : '已有账号？点击返回登入';
            document.getElementById('auth-error').classList.add('hidden');
        }
        
        async function handleAuth() {
            const u = document.getElementById('auth-username').value;
            const p = document.getElementById('auth-password').value;
            const errDiv = document.getElementById('auth-error');
            if(!u || !p) { errDiv.innerText = "请输入账号和密码"; errDiv.classList.remove('hidden'); return; }
            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            document.getElementById('auth-btn').innerText = "请稍候...";
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if(res.ok && data.success) {
                    cfUser = u; cfPass = p;
                    localStorage.setItem('cfUser', u);
                    localStorage.setItem('cfPass', p);
                    document.getElementById('auth-overlay').classList.add('hidden');
                    loadCloudData();
                } else {
                    errDiv.innerText = data.message || "执行失败，请检查数据库绑定";
                    errDiv.classList.remove('hidden');
                }
            } catch(e) {
                alert("网络或代码错误: " + e.message);
                errDiv.innerText = "网络请求失败，请确保已绑定KV并重试部署";
                errDiv.classList.remove('hidden');
            }
            document.getElementById('auth-btn').innerText = isLoginMode ? '登入' : '立即注册';
        }

        async function deleteAccount() {
            if(!cfUser) return;
            const isConfirmed = confirm(`🚨 危险操作警告 🚨\n\n此操作将彻底销毁您的账号【${cfUser}】以及云端所有的笔记数据！\n\n点击“确定”立即注销，点击“取消”放弃。`);
            if (!isConfirmed) return;

            try {
                const res = await fetch('/api/delete-account', {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                const data = await res.json();
                if(res.ok && data.success) {
                    alert("销毁成功：您的账号及所有云端数据已从服务器彻底清除！");
                    localStorage.removeItem('cfUser');
                    localStorage.removeItem('cfPass');
                    location.reload(); 
                } else {
                    alert("注销失败：" + (data.message || "未知错误"));
                }
            } catch(e) {
                alert("网络请求失败：" + e.message);
            }
        }
        
        function logout() {
            localStorage.removeItem('cfUser');
            localStorage.removeItem('cfPass');
            location.reload();
        }
        
        function getAuthHeaders() {
            return {
                'Authorization': 'Basic ' + btoa(unescape(encodeURIComponent(cfUser + ':' + cfPass))),
                'Content-Type': 'application/json'
            };
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            if (window.innerWidth < 768) { toggleLeftPanel(); }
            initResizers();
            initRichTextInteractiveEvents();

            document.getElementById('note-title-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); 
                    document.getElementById('note-editor-richtext').focus(); 
                }
            });  

            if (cfUser && cfPass) {
                document.getElementById('auth-overlay').classList.add('hidden');
                loadCloudData();
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
            }

            applyTheme(localStorage.getItem('app-theme') || 'system');
            updateLanguageUI();
        });
        
        async function loadCloudData() {
            if (typeof marked !== 'undefined') marked.use({ breaks: true, gfm: true });
            try {
                const response = await fetch('/api/sync', { headers: getAuthHeaders() });
                if (response.status === 401) { logout(); return; }
                if (!response.ok) throw new Error('网络响应异常');
                const data = await response.json();
                
                if (data.appName) {
                    document.title = data.appName; 
                    const titleEl = document.querySelector('[data-i18n="app-title"]');
                    if (titleEl) titleEl.innerText = data.appName; 
                    if (dict.zh) dict.zh['app-title'] = data.appName;
                    if (dict.en) dict.en['app-title'] = data.appName;
                }

                if (data.notes) notes = data.notes;
                if (data.categories) {
                    if (data.categories.length > 0 && typeof data.categories[0] === 'string') {
                        categories = data.categories.map(c => ({ id: c, name: c, parentId: null }));
                    } else {
                        categories = data.categories;
                    }
                }
                if (data.categoryColors) categoryColors = data.categoryColors;
                if (data.trashBin) trashBin = data.trashBin;
                if (data.folderTreeRelations) folderTreeRelations = data.folderTreeRelations;
                if (data.leftExpandedFolders) leftExpandedFolders = data.leftExpandedFolders;
                
                // 💡 只有完整且成功地获取了云端数据，才解开安全锁！
                isCloudDataLoaded = true; 
                
                refreshAllViews();
                if (notes.length > 0) {
                    const sorted = [...notes].sort((a,b) => b.updatedAt - a.updatedAt);
                    openNote(sorted[0].id);
                } else {
                    createNewNote(); // 只有真的是新用户，且网络没问题，才创建新笔记
                }
            } catch (error) {
                console.error("数据拉取失败", error);
                // 🚨 如果断网或CF抽风，绝对禁止新建空笔记，并锁定编辑器防止误操作！
                alert("🚨 云端数据加载失败！为防止数据被异常覆盖，已锁定自动保存功能。请检查网络并重启软件。");
                document.getElementById('note-editor-richtext').innerHTML = "<h2 style='color:red; text-align:center; margin-top:20px;'>⚠️ 数据加载失败，请重启软件重试！</h2>";
                document.getElementById('note-editor-richtext').setAttribute('contenteditable', 'false');
            }
        }
        
        async function saveCloudData() {
            // 💡 如果防覆盖安全锁没有解开，直接拒绝保存操作，保护云端数据！
            if(!cfUser || !isCloudDataLoaded) return; 
            
            const allData = {
                notes: notes,
                categories: categories,
                categoryColors: categoryColors,
                trashBin: trashBin,
                folderTreeRelations: folderTreeRelations,
                leftExpandedFolders: leftExpandedFolders
            };
            try {
                await fetch('/api/sync', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(allData)
                });
            } catch (error) {
                console.error("保存到云端失败", error);
            }
        }
        
        function refreshAllViews() {
            document.getElementById('view-tree-list').style.backgroundColor = treeLayoutView === 'list' ? '#3b82f6' : 'transparent';
            document.getElementById('view-tree-grid').style.backgroundColor = treeLayoutView === 'grid' ? '#3b82f6' : 'transparent';
            document.getElementById('view-left-list').style.backgroundColor = leftLayoutView === 'list' ? '#3b82f6' : 'transparent';
            document.getElementById('view-left-grid').style.backgroundColor = leftLayoutView === 'grid' ? '#3b82f6' : 'transparent';
            
            document.getElementById('view-left-list').style.color = leftLayoutView === 'list' ? '#ffffff' : '';
            document.getElementById('view-left-grid').style.color = leftLayoutView === 'grid' ? '#ffffff' : '';

            renderCategoryTree();
            renderCategorySelectOptions();
            renderLeftNotesView();
            renderTrashBin(); 
            document.getElementById('trash-count-badge').innerText = trashBin.length;
        }
        
        function toggleTreeLayout(mode) { treeLayoutView = mode; saveCloudData(); refreshAllViews(); }
        function toggleLeftView(mode) { leftLayoutView = mode; saveCloudData(); refreshAllViews(); }

        function getAllCategoryIds(rootId) {
            let ids = [rootId];
            function findChildren(pId) {
                categories.filter(c => c.parentId === pId).forEach(c => {
                    ids.push(c.id);
                    findChildren(c.id); 
                });
            }
            findChildren(rootId);
            return ids;
        }

        // ==========================================
        // 💡 渲染文件夹树：包含了统一的文件夹和笔记拖拽逻辑
        // ==========================================
        function renderCategoryTree() {
            const container = document.getElementById('category-tree-container'); 
            container.innerHTML = '';
            
            const allDocsContainer = document.getElementById('all-docs-container');
            if(allDocsContainer) allDocsContainer.innerHTML = '';

            const activeStyle = 'bg-blue-500 text-white border-blue-600 shadow';
            const defaultStyle = 'bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 shadow-sm';

            const allBtn = document.createElement('div');
            allBtn.className = `px-2.5 py-0.5 rounded-lg border flex items-center gap-1 cursor-pointer transition-all text-xs font-black ${currentFilterCategory === '全部' ? activeStyle : defaultStyle}`;
            allBtn.innerHTML = `<i class="fa-solid fa-list-check text-[12px]"></i> ${t('all-docs')}`;
            allBtn.onclick = () => { currentFilterCategory = "全部"; refreshAllViews(); };
            if(allDocsContainer) allDocsContainer.appendChild(allBtn);

            const treeRootWrapper = document.createElement('div');
            treeRootWrapper.className = treeLayoutView === 'grid' ? "grid grid-cols-3 gap-1 w-full" : "space-y-1 w-full";

            function buildTreeNodes(parentId, level) {
                const currentLevelNodes = categories.filter(c => c.parentId === parentId);
                currentLevelNodes.forEach(cat => {
                    const isSelected = currentFilterCategory === cat.id;
                    const isExpanded = leftExpandedFolders[cat.id] !== false;
                    const hasChildren = categories.some(c => c.parentId === cat.id);
                    const allCatIds = getAllCategoryIds(cat.id);
                    const noteCount = notes.filter(n => allCatIds.includes(n.category)).length;
                    
                    const cell = document.createElement('div');
                    const paddingLeft = `${level * 12 + 6}px`;
                    cell.className = `py-1 px-2.5 rounded-lg border cursor-pointer transition-all flex items-center justify-between relative h-6 folder-drop-target ${isSelected ? activeStyle : defaultStyle}`;
                    cell.style.paddingLeft = paddingLeft;
                    
                    // --- 恢复：根据文件夹层级动态分配颜色 ---
                    let folderIconColor = 'text-amber-500';         // 1级目录（最顶层）：黄色
                    if (level === 1) folderIconColor = 'text-blue-500';       // 2级目录：蓝色
                    else if (level === 2) folderIconColor = 'text-emerald-500'; // 3级目录：绿色
                    else if (level >= 3) folderIconColor = 'text-purple-500';   // 4级及更深：紫色
                    
                    const iconHtml = hasChildren ? 
                        `<i class="fa-solid ${isExpanded ? 'fa-caret-down' : 'fa-caret-right'} text-[10px] w-3 shrink-0 opacity-50"></i><i class="fa-solid fa-folder ${folderIconColor} text-[12px] shrink-0"></i>` : 
                        `<span class="w-3 inline-block shrink-0"></span><i class="fa-solid fa-folder ${folderIconColor} text-[12px] shrink-0"></i>`;

                    cell.innerHTML = `
                        <div class="flex items-center gap-1.5 truncate flex-1 pr-1">
                            ${iconHtml}
                            <span class="font-extrabold text-[12px] truncate">${t(cat.name)}</span>
                        </div>
                        <span class="text-[10px] font-bold ${isSelected ? 'opacity-100 text-blue-100' : 'opacity-60'} shrink-0">(${noteCount})</span>
                    `;

                    // 💡 适配 PakePlus (WebView2) 的文件夹拖拽与归档
                    cell.setAttribute('draggable', 'true');
                    cell.ondragstart = (e) => {
                        e.dataTransfer.effectAllowed = 'move';
                        // 🔥 核心修复1：PakePlus 必须设置标准的 text/plain 数据，否则系统会直接屏蔽拖拽手势
                        e.dataTransfer.setData('text/plain', JSON.stringify({ type: 'folder', id: cat.id }));
                        e.dataTransfer.setData('text/folder-id', cat.id);
                        setTimeout(() => cell.classList.add('opacity-40'), 0);
                    };
                    cell.ondragend = () => {
                        cell.classList.remove('opacity-40');
                        document.querySelectorAll('.folder-drop-target').forEach(el => el.classList.remove('bg-blue-100', 'dark:bg-blue-900', 'border-blue-400', 'border-dashed'));
                    };
                    cell.ondragover = (e) => {
                        e.preventDefault(); // 🔥 核心修复2：必须无条件阻止默认事件，允许 Drop
                        e.dataTransfer.dropEffect = 'move';
                        cell.classList.add('bg-blue-100', 'dark:bg-blue-900', 'border-blue-400', 'border-dashed');
                    };
                    cell.ondragleave = () => {
                        cell.classList.remove('bg-blue-100', 'dark:bg-blue-900', 'border-blue-400', 'border-dashed');
                    };
                    cell.ondrop = (e) => {
                        e.preventDefault();
                        cell.classList.remove('bg-blue-100', 'dark:bg-blue-900', 'border-blue-400', 'border-dashed');
                        
                        // 解析从 PakePlus 底层传回来的安全数据
                        let dropData = { type: null, id: null };
                        try {
                            const plainText = e.dataTransfer.getData('text/plain');
                            if (plainText) dropData = JSON.parse(plainText);
                        } catch (err) {}

                        const sourceNoteId = dropData.type === 'note' ? dropData.id : draggedNoteId;
                        const sourceFolderId = dropData.type === 'folder' ? dropData.id : e.dataTransfer.getData('text/folder-id');

                        // 情况A：如果拖拽的是笔记文件 -> 归档到该文件夹
                        if (sourceNoteId) {
                            const idx = notes.findIndex(n => n.id === sourceNoteId);
                            if (idx !== -1 && notes[idx].category !== cat.id) {
                                notes[idx].category = cat.id; 
                                saveCloudData(); refreshAllViews();
                            }
                        } 
                        // 情况B：如果拖拽的是文件夹本身 -> 目录树互相嵌套
                        else if (sourceFolderId && sourceFolderId !== cat.id) {
                            if (sourceFolderId === '未分类' || sourceFolderId === '工作' || sourceFolderId === '生活') {
                                alert('系统默认分类目录不可改变层级！'); return;
                            }

                            let isCircular = false;
                            function checkChild(targetId) {
                                const children = categories.filter(c => c.parentId === targetId);
                                if (children.some(c => c.id === cat.id)) { isCircular = true; return; }
                                children.forEach(c => checkChild(c.id));
                            }
                            checkChild(sourceFolderId);

                            if (!isCircular) {
                                const sourceCat = categories.find(c => c.id === sourceFolderId);
                                if (sourceCat) {
                                    sourceCat.parentId = cat.id;
                                    saveCloudData(); refreshAllViews();
                                }
                            } else {
                                alert("🚨 逻辑错误：不能将父级目录移动到它自身的子目录下！");
                            }
                        }
                    };
                    cell.onclick = (e) => {
                        if (e.target.closest('.fa-caret-down') || e.target.closest('.fa-caret-right')) {
                            leftExpandedFolders[cat.id] = !isExpanded;
                            saveCloudData(); refreshAllViews();
                        } else {
                            currentFilterCategory = cat.id;
                            leftExpandedFolders[cat.id] = true;
                            saveCloudData(); refreshAllViews();
                        }
                    };

                    bindCategoryContextMenu(cell, cat.id);
                    treeRootWrapper.appendChild(cell);
                    if (hasChildren && isExpanded) buildTreeNodes(cat.id, level + 1);
                });
            }
            buildTreeNodes(null, 0);
            container.appendChild(treeRootWrapper);
        }

        // ==========================================
        // 💡 渲染左侧笔记流：删除了大的垃圾桶，改为 text-[9px] 极小图标
        // ==========================================
        function renderLeftNotesView() {
            const container = document.getElementById('left-notes-container'); container.innerHTML = '';
            let displayNotes = notes;
    
            if (currentFilterCategory !== "全部") { 
                const targetIds = getAllCategoryIds(currentFilterCategory);
                displayNotes = notes.filter(n => targetIds.includes(n.category)); 
            }

            const searchInput = document.getElementById('global-search-input');
            if (searchInput && searchInput.value.trim() !== '') {
                const keyword = searchInput.value.trim().toLowerCase();
                displayNotes = displayNotes.filter(n => {
                    const titleMatch = (n.title || '').toLowerCase().includes(keyword);
                    const contentMatch = (n.content || '').toLowerCase().includes(keyword);
                    return titleMatch || contentMatch;
                });
            }
    
            const sorted = displayNotes;
            if (sorted.length === 0) { container.innerHTML = `<p class="text-slate-400 text-center text-sm py-4 font-bold">${t('no-data')}</p>`; return; }
    
            const gridWrapper = document.createElement('div'); 
            gridWrapper.className = leftLayoutView === 'list' ? "grid grid-cols-1 gap-1 w-full" : "grid grid-cols-3 gap-1 w-full";
    
            sorted.forEach(note => {
                const box = document.createElement('div');
                const isSelected = note.id === activeNoteId;
                box.onclick = (e) => { if (!e.target.closest('.del-btn')) openNote(note.id); };
        
                const plainText = note.content ? note.content.replace(/<[^>]+>/g, '').substring(0, 15) : '...';
                const displayTitle = note.title || t('untitled'); 
        
                const defaultBoxStyle = 'bg-white dark:bg-slate-800 border-emerald-400 dark:border-emerald-600 hover:bg-emerald-50 dark:hover:bg-slate-700 shadow-sm';
                const activeBoxStyle = 'bg-blue-500 border-blue-600 text-white shadow active-note-item';

               if (leftLayoutView === 'list') {
                    box.className = `w-full py-1 px-2 rounded-lg border cursor-pointer flex flex-col justify-between transition-all text-xs break-all relative group ${isSelected ? activeBoxStyle : defaultBoxStyle}`;
                    box.innerHTML = `
                        <button class="del-btn absolute right-1 top-1 p-0.5 ${isSelected ? 'block text-white hover:text-red-200' : 'hidden'} transition-all z-10" onclick="confirmDelete(event, '${note.id}')"><i class="fa-solid fa-trash-can text-[9px]"></i></button>
                        <div class="w-full overflow-hidden flex flex-col flex-1 pr-4 justify-center">
                            <div class="font-black text-[12px] ${isSelected ? 'text-yellow-200' : 'text-yellow-600 dark:text-yellow-400'} line-clamp-1 leading-snug mb-0" title="${displayTitle}">${displayTitle}</div>
                            <p class="text-[12px] ${isSelected ? 'text-blue-100' : 'text-slate-500 dark:text-slate-400'} line-clamp-1 leading-none">${plainText}</p>
                        </div>
                    `;
                } else {
                    box.className = `w-full h-[72px] p-1.5 rounded-lg border cursor-pointer flex flex-col justify-between transition-all text-xs break-all relative group ${isSelected ? activeBoxStyle : defaultBoxStyle}`;
                    box.innerHTML = `
                        <button class="del-btn absolute right-1 top-1 p-0.5 ${isSelected ? 'block text-white hover:text-red-200' : 'hidden'} transition-all z-10" onclick="confirmDelete(event, '${note.id}')"><i class="fa-solid fa-trash-can text-[9px]"></i></button>
                        <div class="w-full overflow-hidden flex flex-col flex-1 justify-center">
                            <div class="font-black text-[10px] ${isSelected ? 'text-yellow-200' : 'text-yellow-600 dark:text-yellow-400'} line-clamp-1 leading-tight mb-1" title="${displayTitle}">${displayTitle}</div>
                            <p class="text-[10px] ${isSelected ? 'text-blue-100' : 'text-slate-500 dark:text-slate-400'} line-clamp-2 leading-tight">${plainText}</p>
                        </div>
                    `;
                }

                // 💡 适配 PakePlus (WebView2) 的笔记上下排序拖拽
                box.setAttribute('draggable', 'true');
                box.ondragstart = (e) => {
                    draggedNoteId = note.id;
                    e.dataTransfer.effectAllowed = 'move';
                    // 🔥 核心修复：注入 text/plain 标准通讯协议，给 PakePlus 开绿灯
                    e.dataTransfer.setData('text/plain', JSON.stringify({ type: 'note', id: note.id }));
                    setTimeout(() => box.classList.add('opacity-40', 'scale-95'), 0);
                };
                box.ondragend = () => {
                    draggedNoteId = null;
                    box.classList.remove('opacity-40', 'scale-95');
                    document.querySelectorAll('.folder-drop-target').forEach(el => el.classList.remove('bg-blue-100', 'dark:bg-blue-900', 'border-blue-400', 'border-dashed'));
                };
                box.ondragover = (e) => {
                    e.preventDefault(); // 🔥 无条件阻断系统级事件拦截
                    e.dataTransfer.dropEffect = 'move';
                    // 仅在确认是笔记拖拽时才显示蓝色提示线
                    if (draggedNoteId && draggedNoteId !== note.id) {
                        box.classList.add('border-t-2', 'border-blue-500'); 
                    }
                };
                box.ondragleave = () => {
                    box.classList.remove('border-t-2', 'border-blue-500');
                };
                box.ondrop = (e) => {
                    e.preventDefault();
                    box.classList.remove('border-t-2', 'border-blue-500');
                    
                    // 安全提取数据：防止 PakePlus 跨进程时丢失变量
                    let dropNoteId = draggedNoteId;
                    try {
                        const plainText = e.dataTransfer.getData('text/plain');
                        if (plainText) {
                            const data = JSON.parse(plainText);
                            if (data.type === 'note') dropNoteId = data.id;
                        }
                    } catch(err) {}

                    if (dropNoteId && dropNoteId !== note.id) {
                        const fromIdx = notes.findIndex(n => n.id === dropNoteId);
                        const toIdx = notes.findIndex(n => n.id === note.id);
                        if (fromIdx !== -1 && toIdx !== -1) {
                            const [movedItem] = notes.splice(fromIdx, 1);
                            const newToIdx = notes.findIndex(n => n.id === note.id);
                            notes.splice(newToIdx, 0, movedItem);
                            saveCloudData(); renderLeftNotesView();
                        }
                    }
                };
                gridWrapper.appendChild(box);
            });
            container.appendChild(gridWrapper);
        }
        
        function renderTrashBin() {
            const container = document.getElementById('right-trash-flow'); container.innerHTML = '';
            if (rightPanelClosed) return;
            if (trashBin.length === 0) { 
                container.innerHTML = `<p class="text-center py-8 text-slate-400 text-sm font-bold flex flex-col items-center gap-2"><i class="fa-solid fa-wind text-2xl"></i> ${t('trash-empty')}</p>`; 
                return; 
            }
            trashBin.forEach((note) => {
                // 💡 优化 1：缩小卡片上下宽度（p-3 变 py-1 px-2，mb-2 变 mb-1），并赋予点击小手势 cursor-pointer
                const card = document.createElement('div'); card.className = "bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 py-1 px-2 rounded-lg relative group text-xs shadow-sm hover:shadow transition-all mb-1 cursor-pointer";
                
                // 💡 优化 2：实现点击删除笔记立即将内容载入中央编辑栏预览的功能
                card.onclick = (e) => {
                    // 如果点击的不是右侧的操作按钮，才触发预览
                    if (!e.target.closest('button')) {
                        document.getElementById('note-title-input').value = "[回收站预览] " + (note.title || t('untitled'));
                        document.getElementById('note-editor-richtext').innerHTML = note.content;
                    }
                };

                const catObj = categories.find(c => c.id === note.category) || {name: '未分类'};
                const displayTitle = note.title || t('untitled');
                card.innerHTML = `
                    <div class="pr-16 truncate">
                        <div class="font-bold text-slate-900 dark:text-slate-100 truncate mb-0 text-sm">${displayTitle}</div>
                        <span class="text-[11px] text-slate-500 dark:text-slate-400 font-medium block flex items-center gap-1"><i class="fa-solid fa-folder-open text-slate-400"></i> ${t('original-folder')} ${t(catObj.name)}</span>
                    </div>
                    <div class="absolute right-1 top-1/2 -translate-y-1/2 flex gap-1 opacity-60 group-hover:opacity-100 transition-opacity">
                        <button onclick="recoverDeletedFile('${note.id}'); event.stopPropagation();" title="恢复" class="p-1 bg-emerald-50 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-800 rounded-lg text-emerald-600 dark:text-emerald-400 font-bold"><i class="fa-solid fa-rotate-left text-[10px]"></i></button>
                        <button onclick="permanentlyDeleteFile('${note.id}'); event.stopPropagation();" title="彻底删除" class="p-1 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg text-red-600 dark:text-red-400"><i class="fa-solid fa-xmark text-[10px]"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        function createNewNote() {
            const defaultCat = currentFilterCategory !== "全部" ? currentFilterCategory : "未分类";
            const newDoc = { id: 'md_' + Date.now(), title: '', content: '', category: defaultCat, updatedAt: Date.now() };
            notes.unshift(newDoc); 
            saveCloudData(); openNote(newDoc.id);
        }
        
        function openNote(id) {
            activeNoteId = id; const target = notes.find(n => n.id === id);
            if (target) {
                document.getElementById('note-title-input').value = target.title;
                document.getElementById('note-editor-richtext').innerHTML = target.content;
                refreshAllViews(); 
                document.getElementById('note-category-select').value = target.category || "未分类";
            }
        }
        
        function confirmDelete(event, id) {
            event.stopPropagation();
            const isConfirmed = confirm("🚨 确定要将这条笔记移入回收站吗？");
            if (isConfirmed) { deleteNote(id); }
        }

        function deleteNote(id) {
            const idx = notes.findIndex(n => n.id === id); 
            if (idx !== -1) {
                trashBin.push(notes.splice(idx, 1)[0]); saveCloudData();
                if (activeNoteId === id) { if (notes.length > 0) openNote(notes[0].id); else createNewNote(); } else { refreshAllViews(); }
            }
        }
        
        function changeNoteCategory(newCatId) { const idx = notes.findIndex(n => n.id === activeNoteId); if (idx !== -1) { notes[idx].category = newCatId; saveCloudData(); refreshAllViews(); } }
        
        function handleEditorInput() { 
            if (!activeNoteId) return; 
            
            // 💡 1. 立即更新本地数据并重刷列表，实现打字时标题和内容“秒同步”
            const idx = notes.findIndex(n => n.id === activeNoteId);
            if (idx !== -1) {
                notes[idx].title = document.getElementById('note-title-input').value;
                notes[idx].content = document.getElementById('note-editor-richtext').innerHTML;
            }
            renderLeftNotesView(); // 实时渲染左侧列表文字，不再等待 1.5 秒

            // 💡 2. 云端同步和时间戳更新依然使用防抖延迟，防止打字时频繁请求服务器或频繁打乱排序
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const idx2 = notes.findIndex(n => n.id === activeNoteId);
                if (idx2 !== -1) {
                    notes[idx2].updatedAt = Date.now(); // 停止打字后才真正更新时间戳完成最终重排
                }
                saveCloudData();
                renderLeftNotesView(); 
            }, 1500); 
        }
        
        function bindCategoryContextMenu(element, catId) {
            // 💡 禁用手机端系统默认的长按呼出文字选择或系统菜单
            element.style.userSelect = 'none';
            element.style.webkitUserSelect = 'none';
            element.style.webkitTouchCallout = 'none';

            // 💻 电脑端：依然保留标准的右键点击逻辑
            element.oncontextmenu = (e) => {
                e.preventDefault(); e.stopPropagation(); rightClickedCategoryId = catId;
                const menu = document.getElementById('custom-context-menu');
                menu.classList.remove('hidden'); menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
            };

            // 📱 手机端：新增优雅的长按逻辑
            let pressTimer;
            
            // 1. 手指按住时，开始倒计时
            element.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    e.preventDefault(); e.stopPropagation();
                    rightClickedCategoryId = catId;
                    const menu = document.getElementById('custom-context-menu');
                    menu.classList.remove('hidden');
                    
                    // 手机端获取触摸点的坐标（使用 touches[0]）
                    const touch = e.touches[0];
                    menu.style.left = touch.clientX + 'px';
                    menu.style.top = touch.clientY + 'px';
                }, 500); // ⏱️ 500毫秒算作长按，可以根据手感自行调整
            }, { passive: false });

            // 2. 只要手指松开、滑动、或者系统打断，立刻取消倒计时
            const clearTimer = () => { if (pressTimer) clearTimeout(pressTimer); };
            element.addEventListener('touchend', clearTimer);
            element.addEventListener('touchmove', clearTimer);
            element.addEventListener('touchcancel', clearTimer);
        }
        
        function handleContextMenuRename() {
            if (!rightClickedCategoryId) return;
            const catObj = categories.find(c => c.id === rightClickedCategoryId);
            if(!catObj) return;
            const name = prompt(`${t('ctx-rename')} 【${catObj.name}】:`, catObj.name);
            if (!name || name.trim() === "") return;
            catObj.name = name.trim();
            saveCloudData(); refreshAllViews();
        }
        
        function handleContextMenuDelete() {
            if (!rightClickedCategoryId || rightClickedCategoryId === "未分类") return;
            const catObj = categories.find(c => c.id === rightClickedCategoryId);
            if(!catObj) return;
            if (confirm(`确定删除分类目录【${catObj.name}】？其内部子目录及所属笔记都将全部进入回收站。`)) {
                let idsToDelete = [rightClickedCategoryId];
                function findSubIds(pId) {
                    categories.forEach(c => {
                        if(c.parentId === pId) {
                            idsToDelete.push(c.id);
                            findSubIds(c.id);
                        }
                    });
                }
                findSubIds(rightClickedCategoryId);

                const toDeleteNotes = notes.filter(n => idsToDelete.includes(n.category));
                trashBin.push(...toDeleteNotes);
                notes = notes.filter(n => !idsToDelete.includes(n.category));

                categories = categories.filter(c => !idsToDelete.includes(c.id));
                if (idsToDelete.includes(currentFilterCategory)) currentFilterCategory = "全部";
                saveCloudData(); refreshAllViews();
            }
        }
        
        function createNewCategory() {
            const name = prompt("创建全新分类文件夹名称：");
            if (!name || name.trim() === "") return;
            
            let parentId = null;
            if (currentFilterCategory !== "全部") {
                parentId = currentFilterCategory;
            } else {
                const wantParent = confirm("需要将此新文件夹作为当前高亮目录下级子文件夹吗？")
                if(wantParent && activeNoteId) {
                    const currentNote = notes.find(n => n.id === activeNoteId);
                    if(currentNote) parentId = currentNote.category;
                }
            }

            const newId = 'cat_' + Date.now();
            categories.push({ id: newId, name: name.trim(), parentId: parentId });
            saveCloudData(); refreshAllViews();
        }
        
        function renderCategorySelectOptions() {
            const select = document.getElementById('note-category-select'); select.innerHTML = '';
            
            function appendOption(parentId, depth) {
                const layerNodes = categories.filter(c => c.parentId === parentId);
                layerNodes.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = opt.value = cat.id;
                    opt.innerHTML = '—'.repeat(depth) + ' ' + t(cat.name);
                    select.appendChild(opt);
                    appendOption(cat.id, depth + 1); 
                });
            }
            appendOption(null, 0);
        }
        
        function recoverAllTrash() {
            if (trashBin.length === 0) return;
            if (confirm("确定要恢复全部回收站文档吗？")) {
                notes.push(...trashBin); trashBin = []; saveCloudData(); refreshAllViews();
            }
        }
        
        function clearTrashCompletely() { 
            if (trashBin.length === 0) return;
            if (confirm("警告：不可挽回！确定清空回收站吗？")) { trashBin = []; saveCloudData(); refreshAllViews(); } 
        }
        
        function recoverDeletedFile(id) { 
            const idx = trashBin.findIndex(t => t.id === id); 
            if (idx !== -1) { notes.push(trashBin.splice(idx, 1)[0]); saveCloudData(); refreshAllViews(); } 
        }
        
        function permanentlyDeleteFile(id) { 
            if (confirm("永久粉碎不可挽回，是否继续？")) { trashBin = trashBin.filter(t => t.id !== id); saveCloudData(); refreshAllViews(); } 
        }
        
        // 💡 增强了控制悬浮图标跟随折叠并翻转箭头的逻辑
        function toggleLeftPanel() { 
            leftPanelClosed = !leftPanelClosed; 
            document.getElementById('left-panel').classList.toggle('hidden', leftPanelClosed); 
            document.getElementById('resizer-left').classList.toggle('hidden', leftPanelClosed); 
            const icon = document.getElementById('sidebar-float-icon');
            if(icon) icon.classList.toggle('rotate-180', leftPanelClosed);
        }
        function toggleRightPanel() { rightPanelClosed = !rightPanelClosed; document.getElementById('right-panel').classList.toggle('hidden', rightPanelClosed); refreshAllViews(); }
        
        function initResizers() {
            const container = document.getElementById('workspace-container'); 
            const leftPanel = document.getElementById('left-panel'); const resizerLeft = document.getElementById('resizer-left');
            const rightPanel = document.getElementById('right-panel'); const resizerRight = document.getElementById('resizer-right');
            resizerLeft.addEventListener('mousedown', function(e) { e.preventDefault(); resizerLeft.classList.add('resizing'); document.body.classList.add('no-select'); document.addEventListener('mousemove', resizeLeft); document.addEventListener('mouseup', stopResizeLeft); });
            function resizeLeft(e) { let newWidth = e.clientX - container.getBoundingClientRect().left; if (newWidth >= 130 && newWidth <= 480) leftPanel.style.width = newWidth + 'px'; }
            function stopResizeLeft() { resizerLeft.classList.remove('resizing'); document.body.classList.remove('no-select'); document.removeEventListener('mousemove', resizeLeft); document.removeEventListener('mouseup', stopResizeLeft); }
            
            resizerRight.addEventListener('mousedown', function(e) { e.preventDefault(); resizerRight.classList.add('resizing'); document.body.classList.add('no-select'); document.addEventListener('mousemove', resizeRight); document.addEventListener('mouseup', stopResizeRight); });
            // 💡 将 newWidth >= 270 改为 newWidth >= 160
            function resizeRight(e) { let newWidth = container.getBoundingClientRect().right - e.clientX; if (newWidth >= 130 && newWidth <= 480) rightPanel.style.width = newWidth + 'px'; }
            function stopResizeRight() { resizerRight.classList.remove('resizing'); document.body.classList.remove('no-select'); document.removeEventListener('mousemove', resizeRight); document.removeEventListener('mouseup', stopResizeRight); }
        }

        function initRichTextInteractiveEvents() {
               const editor = document.getElementById('note-editor-richtext');
               editor.addEventListener('click', (e) => { if (e.target.tagName === 'A' && (e.ctrlKey || e.metaKey)) window.open(e.target.href, '_blank'); });
    
               let activeImage = null;
               let startY = 0;
               let startHeight = 0;

              const getClientY = (e) => { return e.touches ? e.touches[0].clientY : e.clientY; };

              const startResize = (e) => {
                     if (e.target.tagName === 'IMG') {
                         if(e.touches) { e.stopPropagation(); } 
                         else { e.preventDefault(); }
            
                         activeImage = e.target;
                         startY = getClientY(e);
                         startHeight = activeImage.clientHeight || activeImage.offsetHeight;
            
                         if (!e.touches) document.body.style.cursor = 'nwse-resize';
            
                         if (e.touches) {
                             document.addEventListener('touchmove', resizeImg, { passive: false });
                             document.addEventListener('touchend', stopResizeImg);
                         } else {
                              document.addEventListener('mousemove', resizeImg);
                              document.addEventListener('mouseup', stopResizeImg);
                         }
                    }
              };

              editor.addEventListener('mousedown', startResize);
              editor.addEventListener('touchstart', startResize, { passive: false });

              function resizeImg(e) {
                     if (activeImage) {
                         if (e.touches) { if (e.cancelable) e.preventDefault(); }
                         const dy = getClientY(e) - startY;
                         activeImage.style.height = (startHeight + dy) + 'px';
                         activeImage.style.width = 'auto';
                     }
                }

               function stopResizeImg() {
                      activeImage = null;
                      document.body.style.cursor = 'default';
                       document.removeEventListener('mousemove', resizeImg);
                       document.removeEventListener('mouseup', stopResizeImg);
                       document.removeEventListener('touchmove', resizeImg);
                       document.removeEventListener('touchend', stopResizeImg);
                       handleEditorInput(); 
               }

               editor.addEventListener('paste', (e) => {
                     e.preventDefault(); // 💡 核心：强行拦截浏览器默认那糟糕的粘贴行为

                     // 1. 先检查是不是粘贴的图片
                     let hasImage = false;
                     const items = (e.clipboardData || window.clipboardData).items;
                     for (let i = 0; i < items.length; i++) {
                           if (items[i].type.indexOf("image") !== -1) {
                               hasImage = true;
                               const reader = new FileReader();
                               reader.onload = (event) => execCmd('insertImage', event.target.result);
                               reader.readAsDataURL(items[i].getAsFile());
                           }
                     }

                     // 2. 如果粘贴的不是图片，那就当成文字处理，强制剥离所有格式（去除白底黑字干扰）
                     if (!hasImage) {
                         const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                         document.execCommand('insertText', false, text);
                         handleEditorInput(); // 触发自动保存
                     }
                });
         }
     
        function insertHyperlink() { const url = prompt("请输入超级链接地址:", "https://"); if (url) execCmd('createLink', url); }
        function insertImageUrl() { const url = prompt("请输入网络图片地址:", "https://"); if (url) execCmd('insertImage', url); }
        function execCmd(command, value = null) { document.execCommand(command, false, value); handleEditorInput(); }
        function wrapHTML(startTag, endTag) { const selection = window.getSelection(); if (!selection.rangeCount) return; execCmd('insertHTML', startTag + selection.toString() + endTag); }
        function triggerImport(type) { if (type === 'md') document.getElementById('import-md-input').click(); if (type === 'txt') document.getElementById('import-txt-input').click(); }
        function triggerFolderImport() { document.getElementById('import-folder-input').click(); }
        
        async function exportCurrentFolder() {
            if (currentFilterCategory === "全部") { alert("请先在左侧选择一个特定的分类文件夹后再导出！"); return; }
            const currentCatObj = categories.find(c => c.id === currentFilterCategory);
            if (!currentCatObj) return;

            const originalBtnText = document.querySelector('button[onclick="exportCurrentFolder()"]').innerHTML;
            document.querySelector('button[onclick="exportCurrentFolder()"]').innerHTML = `<i class="fa-solid fa-spinner fa-spin text-blue-200"></i> 打包中...`;

            try {
                const zip = new JSZip();
                function addFilesToZip(folderId, currentZipFolder) {
                    const notesInFolder = notes.filter(n => n.category === folderId);
                    notesInFolder.forEach(note => {
                        let mdContent = note.content;
                        if (typeof TurndownService !== 'undefined' && note.content.includes('<')) {
                            mdContent = new TurndownService().turndown(note.content);
                        }
                        const safeTitle = (note.title || t('untitled')).replace(/[\\/:*?"<>|]/g, "_");
                        currentZipFolder.file(`${safeTitle}.md`, mdContent);
                    });

                    const subFolders = categories.filter(c => c.parentId === folderId);
                    subFolders.forEach(sub => {
                        const safeDirName = sub.name.replace(/[\\/:*?"<>|]/g, "_");
                        const newZipFolder = currentZipFolder.folder(safeDirName);
                        addFilesToZip(sub.id, newZipFolder);
                    });
                }

                const rootFolderName = currentCatObj.name.replace(/[\\/:*?"<>|]/g, "_");
                const rootZip = zip.folder(rootFolderName);
                addFilesToZip(currentFilterCategory, rootZip);

                const content = await zip.generateAsync({ type: "blob" });
                const url = window.URL.createObjectURL(content);
                const a = document.createElement("a");
                a.href = url;
                a.download = `${rootFolderName}_备份.zip`;
                a.click();
                window.URL.revokeObjectURL(url);
                
            } catch (error) {
                console.error("打包导出失败:", error);
                alert("导出失败，请检查控制台报错。");
            } finally {
                document.querySelector('button[onclick="exportCurrentFolder()"]').innerHTML = originalBtnText;
            }
        }

        function handleImportFile(event, type) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                let parsed = e.target.result;
                if(type === 'md' && typeof marked !== 'undefined') parsed = marked.parse(parsed);
                const defaultCat = currentFilterCategory !== "全部" ? currentFilterCategory : "未分类";
                const doc = { id: 'md_' + Date.now(), title: file.name.replace(/\.[^/.]+$/, ""), content: parsed, category: defaultCat, updatedAt: Date.now() };
                notes.push(doc); saveCloudData(); openNote(doc.id); event.target.value = '';
            };
            reader.readAsText(file);
        }

        function handleFolderImport(event) {
            const files = event.target.files; if (!files || files.length === 0) return;
            let loaded = 0; let firstId = null;
            const validFiles = Array.from(files).filter(f => f.name.endsWith('.md') || f.name.endsWith('.txt'));
            if(validFiles.length === 0) return;

            validFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    loaded++; 
                    let currentParentId = null;

                    if (file.webkitRelativePath) {
                        const parts = file.webkitRelativePath.split('/');
                        for (let i = 0; i < parts.length - 1; i++) {
                            const dirName = parts[i];
                            let found = categories.find(c => c.name === dirName && c.parentId === currentParentId);
                            if (!found) {
                                const newCatId = 'cat_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
                                found = { id: newCatId, name: dirName, parentId: currentParentId };
                                categories.push(found);
                            }
                            currentParentId = found.id; 
                        }
                    }

                    const finalCategory = currentParentId || "未分类";
                    let parsed = e.target.result;
                    if(file.name.endsWith('.md') && typeof marked !== 'undefined') parsed = marked.parse(parsed);
                    
                    const newDoc = { 
                        id: 'tree_' + Date.now() + '_' + loaded, 
                        title: file.name.replace(/\.[^/.]+$/, ""), 
                        content: parsed, 
                        category: finalCategory, 
                        updatedAt: Date.now() 
                    };
                    
                    notes.push(newDoc); 
                    if (!firstId) firstId = newDoc.id;
                    
                    if (loaded === validFiles.length) {
                        saveCloudData(); 
                        currentFilterCategory = finalCategory; 
                        if (firstId) openNote(firstId); else refreshAllViews(); 
                        alert("多级目录树导入成功！");
                    }
                };
                reader.readAsText(file);
            });
            event.target.value = '';
        }

        function exportFile(formatType) {
            const title = document.getElementById('note-title-input').value || '未命名随笔';
            let content = document.getElementById('note-editor-richtext').innerText;
            if (formatType === 'md' && typeof TurndownService !== 'undefined') { content = new TurndownService().turndown(document.getElementById('note-editor-richtext').innerHTML); }
            const blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
            const url = window.URL.createObjectURL(blob); 
            const a = document.createElement('a');
            a.download = `${title}.${formatType}`; a.href = url; a.click(); 
            window.URL.revokeObjectURL(url);
        }
         
        function handleLocalImageUpload(event) {
               const files = event.target.files;
               if (!files || files.length === 0) return;

               const editor = document.getElementById('note-editor-richtext');
               if (editor) editor.focus(); // 先让编辑器获取焦点

               // 💡 使用 Array.from 遍历你选中的所有图片文件，逐一处理插入
               Array.from(files).forEach(file => {
                   if (!file.type.startsWith('image/')) { 
                       alert(`文件 [${file.name}] 不是图片类型，已跳过！`); 
                       return; 
                   }
                   const reader = new FileReader();
                   reader.onload = function(e) {
                        const base64Image = e.target.result;
                        document.execCommand('insertImage', false, base64Image);
                        handleEditorInput(); // 触发自动保存
                   };
                   reader.readAsDataURL(file);
               });

               event.target.value = ''; // 清空选中状态，方便下次选同样的图
        }

       function toggleImportExport() {
              const content = document.getElementById('import-export-content');
              const arrow = document.getElementById('import-export-arrow');
              if (content.classList.contains('hidden')) {
                  content.classList.remove('hidden'); arrow.classList.add('rotate-180');  
              } else {
                   content.classList.add('hidden'); arrow.classList.remove('rotate-180'); 
              }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Service Worker 注册成功!', reg))
                    .catch(err => console.error('PWA 注册失败:', err));
            });
        }
