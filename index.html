                        <span class="text-[11px] text-slate-500 dark:text-slate-400 font-medium block flex items-center gap-1"><i class="fa-solid fa-folder-open text-slate-400"></i> ${t('original-folder')} ${t(catObj.name)}</span>
                    </div>
                    <div class="absolute right-1 top-1/2 -translate-y-1/2 flex gap-1 opacity-60 group-hover:opacity-100 transition-opacity">
                        <button onclick="recoverDeletedFile('${note.id}'); event.stopPropagation();" title="${t('title-recover-btn')}" data-i18n-title="title-recover-btn" class="p-1 bg-emerald-50 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-800 rounded-lg text-emerald-600 dark:text-emerald-400 font-bold"><i class="fa-solid fa-rotate-left text-[10px]"></i></button>
                        <button onclick="permanentlyDeleteFile('${note.id}'); event.stopPropagation();" title="${t('title-del-btn')}" data-i18n-title="title-del-btn" class="p-1 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg text-red-600 dark:text-red-400"><i class="fa-solid fa-xmark text-[10px]"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        function createNewNote() {
            const defaultCat = currentFilterCategory !== "全部" ? currentFilterCategory : "未分类";
            const newDoc = { id: 'md_' + Date.now(), title: '', content: '', category: defaultCat, updatedAt: Date.now() };
            notes.unshift(newDoc); saveLocalData(); openNote(newDoc.id);
        }
        
        function openNote(id) {
            activeNoteId = id; const target = notes.find(n => n.id === id);
            if (target) {
                document.getElementById('note-title-input').value = target.title;
                document.getElementById('note-editor-richtext').innerHTML = target.content;
                refreshAllViews(); document.getElementById('note-category-select').value = target.category || "未分类";
            }
        }
        
        function confirmDelete(event, id) { event.stopPropagation(); if (confirm(t('confirm-trash-note'))) deleteNote(id); }
        function deleteNote(id) {
            if (id === 'system_default_instruction') {
                alert("💡 提示：这是系统内置的使用功能说明书，不能删除哦！");
                return;
            }
            const idx = notes.findIndex(n => n.id === id); 
            if (idx !== -1) {
                trashBin.push(notes.splice(idx, 1)[0]); saveLocalData();
                if (activeNoteId === id) { if (notes.length > 0) openNote(notes[0].id); else createNewNote(); } else { refreshAllViews(); }
            }
        }
        function changeNoteCategory(newCatId) { const idx = notes.findIndex(n => n.id === activeNoteId); if (idx !== -1) { notes[idx].category = newCatId; saveLocalData(); refreshAllViews(); } }
        
        function handleEditorInput() { 
            if (!activeNoteId) return; 
            const idx = notes.findIndex(n => n.id === activeNoteId);
            if (idx !== -1) {
                notes[idx].title = document.getElementById('note-title-input').value;
                notes[idx].content = document.getElementById('note-editor-richtext').innerHTML;
            }
            renderLeftNotesView(); 
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const idx2 = notes.findIndex(n => n.id === activeNoteId);
                if (idx2 !== -1) notes[idx2].updatedAt = Date.now(); 
                saveLocalData(); renderLeftNotesView(); 
            }, 1500); 
        }
        
        function bindCategoryContextMenu(element, catId) {
            element.oncontextmenu = (e) => {
                e.preventDefault(); e.stopPropagation(); rightClickedCategoryId = catId;
                const menu = document.getElementById('custom-context-menu');
                menu.classList.remove('hidden'); menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
            };
        }
        
        function handleContextMenuRename() {
            if (!rightClickedCategoryId) return;
            const catObj = categories.find(c => c.id === rightClickedCategoryId);
            if(!catObj) return;
            const name = prompt(`${t('ctx-rename')} 【${catObj.name}】:`, catObj.name);
            if (!name || name.trim() === "") return;
            catObj.name = name.trim(); saveLocalData(); refreshAllViews();
        }
        
        function handleContextMenuDelete() {
            if (!rightClickedCategoryId || rightClickedCategoryId === "未分类") return;
            const catObj = categories.find(c => c.id === rightClickedCategoryId);
            if(!catObj) return;
            if (confirm(t('confirm-del-folder').replace('{name}', catObj.name))) {
                let idsToDelete = [rightClickedCategoryId];
                function findSubIds(pId) { categories.forEach(c => { if(c.parentId === pId) { idsToDelete.push(c.id); findSubIds(c.id); } }); }
                findSubIds(rightClickedCategoryId);
                const toDeleteNotes = notes.filter(n => idsToDelete.includes(n.category));
                trashBin.push(...toDeleteNotes);
                notes = notes.filter(n => !idsToDelete.includes(n.category));
                categories = categories.filter(c => !idsToDelete.includes(c.id));
                if (idsToDelete.includes(currentFilterCategory)) currentFilterCategory = "全部";
                saveLocalData(); refreshAllViews();
            }
        }
        
        function createNewCategory() {
            const name = prompt("创建全新分类文件夹名称：");
            if (!name || name.trim() === "") return;
            let parentId = null;
            if (currentFilterCategory !== "全部") { parentId = currentFilterCategory; } 
            else {
                if(confirm("需要将此新文件夹作为当前高亮目录下级子文件夹吗？") && activeNoteId) {
                    const currentNote = notes.find(n => n.id === activeNoteId);
                    if(currentNote) parentId = currentNote.category;
                }
            }
            categories.push({ id: 'cat_' + Date.now(), name: name.trim(), parentId: parentId });
            saveLocalData(); refreshAllViews();
        }
        
        function renderCategorySelectOptions() {
            const select = document.getElementById('note-category-select'); select.innerHTML = '';
            function appendOption(parentId, depth) {
                categories.filter(c => c.parentId === parentId).forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.id; opt.innerHTML = t(cat.name);
                    select.appendChild(opt); appendOption(cat.id, depth + 1); 
                });
            }
            appendOption(null, 0);
        }
        
        function recoverAllTrash() { if (trashBin.length > 0 && confirm("确定要恢复全部回收站文档吗？")) { notes.push(...trashBin); trashBin = []; saveLocalData(); refreshAllViews(); } }
        function clearTrashCompletely() { if (trashBin.length > 0 && confirm("警告：不可挽回！确定清空回收站吗？")) { trashBin = []; saveLocalData(); refreshAllViews(); } }
        function recoverDeletedFile(id) { const idx = trashBin.findIndex(t => t.id === id); if (idx !== -1) { notes.push(trashBin.splice(idx, 1)[0]); saveLocalData(); refreshAllViews(); } }
        function permanentlyDeleteFile(id) { if (confirm("永久粉碎不可挽回，是否继续？")) { trashBin = trashBin.filter(t => t.id !== id); saveLocalData(); refreshAllViews(); } }
        
        function toggleLeftPanel() { 
            leftPanelClosed = !leftPanelClosed; 
            document.getElementById('left-panel').classList.toggle('hidden', leftPanelClosed); 
            document.getElementById('resizer-left').classList.toggle('hidden', leftPanelClosed); 
            const icon = document.getElementById('sidebar-float-icon');
            if(icon) icon.classList.toggle('rotate-180', leftPanelClosed);
        }
        function toggleRightPanel() { rightPanelClosed = !rightPanelClosed; document.getElementById('right-panel').classList.toggle('hidden', rightPanelClosed); refreshAllViews(); }
        
        function initResizers() {
            const container = document.getElementById('workspace-container'); 
            const leftPanel = document.getElementById('left-panel'); const resizerLeft = document.getElementById('resizer-left');
            const rightPanel = document.getElementById('right-panel'); const resizerRight = document.getElementById('resizer-right');
            resizerLeft.addEventListener('mousedown', function(e) { e.preventDefault(); resizerLeft.classList.add('resizing'); document.body.classList.add('no-select'); document.addEventListener('mousemove', resizeLeft); document.addEventListener('mouseup', stopResizeLeft); });
            function resizeLeft(e) { let newWidth = e.clientX - container.getBoundingClientRect().left; if (newWidth >= 120 && newWidth <= 480) leftPanel.style.width = newWidth + 'px'; }
            function stopResizeLeft() { resizerLeft.classList.remove('resizing'); document.body.classList.remove('no-select'); document.removeEventListener('mousemove', resizeLeft); document.removeEventListener('mouseup', stopResizeLeft); }
            
            resizerRight.addEventListener('mousedown', function(e) { e.preventDefault(); resizerRight.classList.add('resizing'); document.body.classList.add('no-select'); document.addEventListener('mousemove', resizeRight); document.addEventListener('mouseup', stopResizeRight); });
            function resizeRight(e) { let newWidth = container.getBoundingClientRect().right - e.clientX; if (newWidth >= 130 && newWidth <= 480) rightPanel.style.width = newWidth + 'px'; }
            function stopResizeRight() { resizerRight.classList.remove('resizing'); document.body.classList.remove('no-select'); document.removeEventListener('mousemove', resizeRight); document.removeEventListener('mouseup', stopResizeRight); }
        }

        window.toggleImgLock = function(btn, e) {
            if(e) e.stopPropagation();
            const wrapper = btn.closest('.custom-img-wrapper');
            const icon = btn.querySelector('i');
            if (wrapper.classList.contains('locked')) {
                wrapper.classList.remove('locked'); btn.classList.remove('locked'); icon.className = 'fa-solid fa-lock-open';
            } else {
                wrapper.classList.add('locked'); btn.classList.add('locked'); icon.className = 'fa-solid fa-lock';
            }
            handleEditorInput();
        };

        window.imgDragStart = function(e) { e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', 'custom-img-wrapper'); window.draggingImageNode = e.target; };
        window.imgDragEnd = function(e) { e.target.classList.remove('dragging'); window.draggingImageNode = null; handleEditorInput(); };

        let currentImageWrapper = null;
        window.showImgContextMenu = function(e, wrapper) { currentImageWrapper = wrapper; const menu = document.getElementById('img-context-menu'); menu.classList.remove('hidden'); menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px'; };

        window.imgMenuAction = async function(action) {
            const menu = document.getElementById('img-context-menu'); menu.classList.add('hidden');
            if (!currentImageWrapper) return;
            const img = currentImageWrapper.querySelector('img');

            const writeToClipboard = () => {
                return new Promise((resolve, reject) => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.naturalWidth || img.width;
                        canvas.height = img.naturalHeight || img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        canvas.toBlob(async (blob) => {
                            if (!blob) throw new Error('Blob 生成失败');
                            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                            resolve();
                        }, 'image/png');
                    } catch (err) { reject(err); }
                });
            };

            if (action === 'download') {
                const a = document.createElement('a'); a.href = img.src; a.download = 'image_' + Date.now() + '.jpg'; a.click();
            } else if (action === 'copy') {
                try {
                    await writeToClipboard();
                    // 弹窗已移除，静默复制
                } catch(err) {
                    console.error('复制失败', err);
                }
            } else if (action === 'cut') {
                try {
                    await writeToClipboard();
                    currentImageWrapper.remove();
                    handleEditorInput();
                    // 弹窗已移除，静默剪切
                } catch(err) {
                    console.error('剪切失败', err);
                }
            } else if (action === 'delete') {
                // 确认弹窗已移除，点击直接静默删除
                currentImageWrapper.remove();
                handleEditorInput(); 
            }
            
            currentImageWrapper = null;
        };

        function initRichTextInteractiveEvents() {
               let activeImage = null; let startY = 0; let startX = 0; let startWidth = 0; let startRatio = 1;
               const editor = document.getElementById('note-editor-richtext');
               
               editor.addEventListener('click', (e) => { 
                   if (e.target.tagName === 'A' && (e.ctrlKey || e.metaKey)) window.open(e.target.href, '_blank'); 
                   const lockBtn = e.target.closest('.img-lock-btn');
                   if (lockBtn) { e.preventDefault(); e.stopPropagation(); window.toggleImgLock(lockBtn, e); }
               });
    
               editor.addEventListener('contextmenu', (e) => { const wrapper = e.target.closest('.custom-img-wrapper'); if (wrapper) { e.preventDefault(); showImgContextMenu(e, wrapper); } });
               editor.addEventListener('dblclick', (e) => { const wrapper = e.target.closest('.custom-img-wrapper'); if (wrapper) { e.preventDefault(); showImgContextMenu(e, wrapper); } });
               editor.addEventListener('dragover', (e) => { if (window.draggingImageNode) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; } });

               editor.addEventListener('drop', (e) => {
                   if (window.draggingImageNode) {
                       e.preventDefault(); let range = null;
                       if (document.caretRangeFromPoint) { range = document.caretRangeFromPoint(e.clientX, e.clientY); } 
                       else if (document.caretPositionFromPoint) { const pos = document.caretPositionFromPoint(e.clientX, e.clientY); range = document.createRange(); range.setStart(pos.offsetNode, pos.offset); }
                       if (range) { window.draggingImageNode.remove(); range.insertNode(window.draggingImageNode); const space = document.createTextNode('\u00A0'); range.collapse(false); range.insertNode(space); }
                       window.draggingImageNode = null; handleEditorInput();
                   }
               });

               const getClientY = (e) => { return e.touches ? e.touches[0].clientY : e.clientY; };
               const getClientX = (e) => { return e.touches ? e.touches[0].clientX : e.clientX; };

               const startResize = (e) => {
                      if (e.target.tagName === 'IMG' && !e.target.closest('.locked')) {
                          if(e.touches) { e.stopPropagation(); } else { e.preventDefault(); }
                          activeImage = e.target; 
                          startY = getClientY(e); 
                          startX = getClientX(e); 
                          startWidth = activeImage.clientWidth || activeImage.offsetWidth;
                          const startHeight = activeImage.clientHeight || activeImage.offsetHeight;
                          startRatio = startWidth / startHeight;

                          if (!e.touches) document.body.style.cursor = 'nwse-resize';
                          if (e.touches) { document.addEventListener('touchmove', resizeImg, { passive: false }); document.addEventListener('touchend', stopResizeImg); } 
                          else { document.addEventListener('mousemove', resizeImg); document.addEventListener('mouseup', stopResizeImg); }
                     }
               };
               editor.addEventListener('mousedown', startResize); editor.addEventListener('touchstart', startResize, { passive: false });

               function resizeImg(e) {
                      if (activeImage) {
                          if (e.touches) { if (e.cancelable) e.preventDefault(); }
                          const dy = getClientY(e) - startY;
                          const dx = getClientX(e) - startX;
                          const deltaWidth = Math.abs(dx) > Math.abs(dy) ? dx : (dy * startRatio);
                          activeImage.style.width = Math.max(30, startWidth + deltaWidth) + 'px'; 
                          activeImage.style.height = 'auto'; 
                      }
                }

               function stopResizeImg() {
                      activeImage = null; document.body.style.cursor = 'default';
                      document.removeEventListener('mousemove', resizeImg); document.removeEventListener('mouseup', stopResizeImg);
                      document.removeEventListener('touchmove', resizeImg); document.removeEventListener('touchend', stopResizeImg);
                      handleEditorInput(); 
               }

               editor.addEventListener('paste', (e) => {
                     const items = (e.clipboardData || window.clipboardData).items;
                     let imageFile = null;

                     // 1. 查找剪贴板里有没有图片文件（比如截图、复制的本地图片）
                     for (let i = 0; i < items.length; i++) {
                           if (items[i].type.indexOf("image") !== -1) {
                               imageFile = items[i].getAsFile();
                               if (imageFile) break; // 找到了就跳出循环
                           }
                     }

                     if (imageFile) {
                         e.preventDefault(); // 拦截默认粘贴
                         
                         // 🚨 核心修复 1：提前记住当前光标的确切位置！
                         const selection = window.getSelection();
                         if (!selection.rangeCount) return;
                         const savedRange = selection.getRangeAt(0).cloneRange();

                         const reader = new FileReader();
                         reader.onload = (event) => {
                             // 🚨 核心修复 2：图片读取完毕后，先把光标恢复到刚才记住的位置
                             selection.removeAllRanges();
                             selection.addRange(savedRange);

                             const base64Image = event.target.result;
                             
                             // 🚨 核心修复 3：修正了变量名，并使用 <div> 强制换行包裹，防止多张图片变成连体婴！
                             const imgHTML = `<div style="text-align: left;">&#8203;<span class="custom-img-wrapper locked" contenteditable="false" draggable="true" ondragstart="window.imgDragStart(event)" ondragend="window.imgDragEnd(event)"><img src="${base64Image}" alt="图片" /><span class="img-lock-btn locked" title="${t('title-unlock')}" data-i18n-title="title-unlock" contenteditable="false"><i class="fa-solid fa-lock"></i></span></span></div><div><br></div>`;
                             
                             execCmd('insertHTML', imgHTML);
                         };
                         reader.readAsDataURL(imageFile);
                     } else {
                         // 🚨 如果是粘贴普通文字，为了防止带入乱七八糟的网页格式，强制转换为纯文本粘贴
                         const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                         if (text) {
                             e.preventDefault();
                             document.execCommand('insertText', false, text);
                         }
                         setTimeout(() => { handleEditorInput(); }, 100);
                     }
                });

                editor.addEventListener('keyup', function(e) {
                    const sel = window.getSelection();
                    if (!sel.rangeCount || !sel.isCollapsed) return;
                    
                    let node = sel.anchorNode;
                    let el = node.nodeType === 3 ? node.parentNode : node;

                    if (e.key === 'Enter') {
                        const heading = el.closest('h1, h2, h3, blockquote');
                        if (heading && heading.textContent.trim() === '') {
                            e.preventDefault();
                            document.execCommand('formatBlock', false, '<div>'); 
                            document.execCommand('removeFormat', false, null);   
                        }
                        return; 
                    }

                    if (e.key === ' ' || e.code === 'Space') {
                        if (node.nodeType === 3) {
                            const text = node.textContent;
                            const match = text.match(/^(#{1,3}|-|\*|1\.|>)\s$/);
                            
                            if (match) {
                                e.preventDefault();
                                const trigger = match[1];
                                
                                node.textContent = '\u200B';
                                
                                const newRange = document.createRange();
                                newRange.setStart(node, 1);
                                newRange.collapse(true);
                                sel.removeAllRanges();
                                sel.addRange(newRange);
                                
                                if (trigger === '#') execCmd('formatBlock', '<H1>');
                                else if (trigger === '##') execCmd('formatBlock', '<H2>');
                                else if (trigger === '###') execCmd('formatBlock', '<H3>');
                                else if (trigger === '-' || trigger === '*') execCmd('insertUnorderedList');
                                else if (trigger === '1.') execCmd('insertOrderedList');
                                else if (trigger === '>') execCmd('formatBlock', '<BLOCKQUOTE>');
                            }
                        }
                    }
                });
         }
     
        function insertHyperlink() { const url = prompt("请输入超级链接地址:", "https://"); if (url) execCmd('createLink', url); }
        function execCmd(command, value = null) { document.execCommand(command, false, value); handleEditorInput(); }
        
        function clearAllFormat() {
               const selection = window.getSelection();
               if (!selection.rangeCount) return;
               document.execCommand('removeFormat', false, null);
               document.execCommand('formatBlock', false, '<div>');
               document.execCommand('backColor', false, 'transparent');
               handleEditorInput();
        }

        function wrapHTML(startTag, endTag) { const selection = window.getSelection(); if (!selection.rangeCount) return; execCmd('insertHTML', startTag + selection.toString() + endTag); }
        function triggerImport(type) { if (type === 'md') document.getElementById('import-md-input').click(); if (type === 'txt') document.getElementById('import-txt-input').click(); }
        function triggerFolderImport() { document.getElementById('import-folder-input').click(); }
        
        async function exportCurrentFolder() {
            if (currentFilterCategory === "全部") { alert("请先在左侧选择分类！"); return; }
            const currentCatObj = categories.find(c => c.id === currentFilterCategory); if (!currentCatObj) return;
            const originalBtnText = document.querySelector('button[onclick="exportCurrentFolder()"]').innerHTML;
            document.querySelector('button[onclick="exportCurrentFolder()"]').innerHTML = `<i class="fa-solid fa-spinner fa-spin text-blue-200"></i> 打包中...`;
            try {
                const zip = new JSZip();
                function addFilesToZip(folderId, currentZipFolder) {
                    notes.filter(n => n.category === folderId).forEach(note => {
                        let mdContent = note.content; if (typeof TurndownService !== 'undefined' && note.content.includes('<')) mdContent = new TurndownService().turndown(note.content);
                        currentZipFolder.file(`${(note.title || t('untitled')).replace(/[\\/:*?"<>|]/g, "_")}.md`, mdContent);
                    });
                    categories.filter(c => c.parentId === folderId).forEach(sub => { addFilesToZip(sub.id, currentZipFolder.folder(sub.name.replace(/[\\/:*?"<>|]/g, "_"))); });
                }
                const rootFolderName = currentCatObj.name.replace(/[\\/:*?"<>|]/g, "_");
                addFilesToZip(currentFilterCategory, zip.folder(rootFolderName));
                const content = await zip.generateAsync({ type: "blob" });
                const url = window.URL.createObjectURL(content); const a = document.createElement("a"); a.href = url; a.download = `${rootFolderName}_备份.zip`; a.click(); window.URL.revokeObjectURL(url);
            } catch (error) { alert("导出失败"); } finally { document.querySelector('button[onclick="exportCurrentFolder()"]').innerHTML = originalBtnText; }
        }

        function handleImportFile(event, type) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                let parsed = e.target.result; if(type === 'md' && typeof marked !== 'undefined') parsed = marked.parse(parsed);
                const defaultCat = currentFilterCategory !== "全部" ? currentFilterCategory : "未分类";
                const doc = { id: 'md_' + Date.now(), title: file.name.replace(/\.[^/.]+$/, ""), content: parsed, category: defaultCat, updatedAt: Date.now() };
                notes.push(doc); saveLocalData(); openNote(doc.id); event.target.value = '';
            };
            reader.readAsText(file);
        }

        function handleFolderImport(event) {
            const files = event.target.files; if (!files || files.length === 0) return;
            let loaded = 0; let firstId = null;
            const validFiles = Array.from(files).filter(f => f.name.endsWith('.md') || f.name.endsWith('.txt'));
            if(validFiles.length === 0) return;
            validFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    loaded++; let currentParentId = null;
                    if (file.webkitRelativePath) {
                        const parts = file.webkitRelativePath.split('/');
                        for (let i = 0; i < parts.length - 1; i++) {
                            const dirName = parts[i]; let found = categories.find(c => c.name === dirName && c.parentId === currentParentId);
                            if (!found) { found = { id: 'cat_' + Date.now() + '_' + Math.floor(Math.random() * 10000), name: dirName, parentId: currentParentId }; categories.push(found); }
                            currentParentId = found.id; 
                        }
                    }
                    const finalCategory = currentParentId || "未分类";
                    let parsed = e.target.result; if(file.name.endsWith('.md') && typeof marked !== 'undefined') parsed = marked.parse(parsed);
                    const newDoc = { id: 'tree_' + Date.now() + '_' + loaded, title: file.name.replace(/\.[^/.]+$/, ""), content: parsed, category: finalCategory, updatedAt: Date.now() };
                    notes.push(newDoc); if (!firstId) firstId = newDoc.id;
                    if (loaded === validFiles.length) { saveLocalData(); currentFilterCategory = finalCategory; if (firstId) openNote(firstId); else refreshAllViews(); alert("多级目录树导入成功！"); }
                };
                reader.readAsText(file);
            });
            event.target.value = '';
        }

        function exportFile(formatType) {
            const title = document.getElementById('note-title-input').value || '未命名随笔';
            let content = document.getElementById('note-editor-richtext').innerText;
            if (formatType === 'md' && typeof TurndownService !== 'undefined') { content = new TurndownService().turndown(document.getElementById('note-editor-richtext').innerHTML); }
            const blob = new Blob([content], {type: 'text/plain;charset=utf-8'}); const url = window.URL.createObjectURL(blob); 
            const a = document.createElement('a'); a.download = `${title}.${formatType}`; a.href = url; a.click(); window.URL.revokeObjectURL(url);
        }
         
        function handleLocalImageUpload(event) {
            const files = event.target.files; if (!files || files.length === 0) return;
            const editor = document.getElementById('note-editor-richtext'); if (editor) editor.focus(); 
            
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) { return; }
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const MAX_WIDTH = 1200; 
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        ctx.fillStyle = "#ffffff";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.9);
                        
                        // 注意：这是修改后的超级换行隔断版，请替换掉原来的 const imgHTML = ... 那行代码
                        const imgHTML = `<div style="text-align: left;">&#8203;<span class="custom-img-wrapper locked" contenteditable="false" draggable="true" ondragstart="window.imgDragStart(event)" ondragend="window.imgDragEnd(event)"><img src="${compressedBase64}" alt="图片" /><span class="img-lock-btn locked" title="${t('title-unlock')}" data-i18n-title="title-unlock" contenteditable="false"><i class="fa-solid fa-lock"></i></span></span></div><div><br></div>`;
                        execCmd('insertHTML', imgHTML);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            event.target.value = '';
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
        
        function toggleShortcutPanel(event) {
               event.stopPropagation(); 
               const panel = document.getElementById('shortcut-panel');
               const arrow = document.getElementById('shortcut-arrow');
    
               if (panel.classList.contains('hidden')) {
                   panel.classList.remove('hidden');
                   panel.classList.add('flex');
                   arrow.classList.add('rotate-180');
               } else {
                    panel.classList.add('hidden');
                    panel.classList.remove('flex');
                    arrow.classList.remove('rotate-180');
               }
         }

        const userShortcuts = {
              newNote: '',
              newFolder: ''
         };

        function captureShortcut(event, action) {
               event.preventDefault();  
               event.stopPropagation();

               const key = event.key;
               if (['Control', 'Shift', 'Alt', 'Meta'].includes(key)) return;

               let shortcutStr = '';
               if (event.ctrlKey) shortcutStr += 'Ctrl + ';
               if (event.altKey) shortcutStr += 'Alt + ';
               if (event.shiftKey) shortcutStr += 'Shift + ';

               shortcutStr += key.length === 1 ? key.toUpperCase() : key;
               event.target.value = shortcutStr;
               userShortcuts[action] = shortcutStr;
               event.target.blur();
         }

         let lastKeyPress = '';
         let lastKeyPressTime = 0;

         document.addEventListener('keydown', function(event) {
             if (event.target.id && event.target.id.includes('shortcut-')) {
                 return; 
             }
             let currentPress = '';
             const hasModifier = event.ctrlKey || event.altKey || event.shiftKey || event.metaKey;

             if (event.ctrlKey) currentPress += 'Ctrl + ';
             if (event.altKey) currentPress += 'Alt + ';
             if (event.shiftKey) currentPress += 'Shift + ';
             currentPress += event.key.length === 1 ? event.key.toUpperCase() : event.key;

             let matchedAction = null;
             if (currentPress === userShortcuts.newNote && userShortcuts.newNote !== '') matchedAction = 'newNote';
             else if (currentPress === userShortcuts.newFolder && userShortcuts.newFolder !== '') matchedAction = 'newFolder';

             if (!matchedAction) {
                 lastKeyPress = currentPress;
                 lastKeyPressTime = new Date().getTime();
                 return;
             }

             if (hasModifier) {
                 event.preventDefault();
                 executeShortcut(matchedAction);
             } else {
                 const currentTime = new Date().getTime();
                 if (lastKeyPress === currentPress && (currentTime - lastKeyPressTime) < 400) {
                     event.preventDefault(); 
                     executeShortcut(matchedAction);
                     lastKeyPress = '';
                     lastKeyPressTime = 0;
                 } else {
                     lastKeyPress = currentPress;
                     lastKeyPressTime = currentTime;
                 }
             }
         });

         function executeShortcut(action) {
             if (action === 'newNote') {
                 if(typeof createNewNote === 'function') createNewNote();
             } else if (action === 'newFolder') {
                 if(typeof createNewCategory === 'function') createNewCategory();
             }
         }

          // 🌟 终极修复版：点击空白处自动关闭历史栏
        document.addEventListener('click', function(event) {
            const rightPanel = document.getElementById('right-panel');
            
            // 1. 判断历史栏是否存在并且处于“打开”状态
            if (rightPanel && !rightPanel.classList.contains('hidden')) {
                
                // 2. 检查点击的位置是否在历史栏“内部”
                const isInsidePanel = rightPanel.contains(event.target);
                
                // 3. 检查点击的位置是否是那个红色的“历史按钮”（通过找图标特征来认，绝对不会丢）
                const isHistoryBtn = event.target.closest('.fa-clock-rotate-left') || event.target.closest('button[title="历史记录"]');
                
                // 4. 如果点的既不是历史栏里面，也不是历史按钮，那就果断关闭它！
                if (!isInsidePanel && !isHistoryBtn) {
                    rightPanelClosed = true; // 同步系统状态
                    rightPanel.classList.add('hidden'); // 隐藏界面
                }
            }
        });    
        
    </script>
